  <body class="dark:bg-slate-900">
    <header

        <a

            src="./assets/img/contents/logo-light.svg"
            alt="Base logo"
            class="block dark:hidden"
          />
          <img
            src="./assets/img/contents/logo-dark.svg"
            alt="Base logo"
            class="hidden dark:block"
          />
        </a>
        <nav
          class="relative w-[25%] md:w-25 lg:w-auto flex justify-between gap-8 md:justify-between items-center"
        >
          <button
            aria-label="Toggle theme"
            class="block lg:hidden w-6 md:w-8"
            data-btn="switch-mode"
          >
            <img
              src="./assets/img/contents/night-mode-icon.png"
              alt="switch mode icon"
              class="block dark:hidden cursor-pointer transition-transform duration-200 hover:scale-110"
              data-img="icon"
            />
            <img
              src="./assets/img/contents/light-mode-icon.png"
              alt="switch mode icon"
              class="hidden dark:block cursor-pointer transition-transform duration-200 hover:scale-110"
              data-img="icon"
            />
          </button>

          <button class="text-xl md:text-[26px] lg:hidden" data-btn="toggle">
            <span
              class="fa-solid fa-bars transition-transform duration-300 dark:text-slate-100"
            ></span>
          </button>

          <ul
            class="absolute lg:static top-[180%] -right-4 md:right-0 lg:top-[120%] lg:right-0 w-[95vw] md:w-180 lg:w-full pt-4 pb-4 px-6 opacity-0 lg:opacity-100 flex flex-col gap-4 lg:flex-row lg:gap-10 lg:items-center lg:text-lg text-gray-500 font-medium border-none rounded-md bg-white lg:bg-transparent dark:bg-slate-800 lg:dark:bg-transparent shadow-md lg:shadow-none transition-all duration-100 dark:text-slate-100"

          >
            <li class="transition-colors duration-300 hover:text-indigo-500">
              <a href="javascript:void(0)">Home</a>
            </li>
            <li class="transition-colors duration-300 hover:text-indigo-500">
              <a href="javascript:void(0)">Features</a>
            </li>
            <li class="group relative">
              <a
                href="javascript:void(0)"
                class="transition-colors duration-300 group-hover:text-indigo-500"
                data-btn="dropdown"
              >
                <span>Pages</span>
                <span class="fa-solid fa-chevron-down text-sm"></span>
              </a>
              <div
                class="wrapper pt-8 absolute left-0 -top-8 lg:top-full -translate-x-4 transition duration-500 pointer-events-none group-hover:pointer-events-auto opacity-0 group-hover:opacity-100 translate-y-10 group-hover:translate-y-0"
                data-list="dropdown"
              >
                <ul
                  class="dropdown-menu relative bg-white w-52 shadow-md rounded-md p-2 lg:pb-4 text-base border-none dark:bg-slate-800 before:content-[''] before:absolute before:-top-1.5 before:left-6 before:w-3 before:h-3 before:bg-white dark:before:bg-slate-800 before:rotate-45 dark:text-slate-100"

                  </li>
                  <li
                    class="relative overflow-hidden mb-1 lg:mb-3 py-1 lg:py-2 after:absolute after:left-0 after:bottom-0 after:w-full after:h-0.5 after:content-[''] after:bg-linear-to-r after:from-indigo-500 after:to-pink-500 after:-translate-x-full hover:after:translate-x-0 after:transition-transform after:duration-500 ease-in-out hover:text-gray-700 dark:hover:text-gray-200"
                  >
                    <a href="javascript:void(0)">Blog Single</a>
                  </li>
                  <li
                    class="relative overflow-hidden mb-1 lg:mb-3 py-1 lg:py-2 after:absolute after:left-0 after:bottom-0 after:w-full after:h-0.5 after:content-[''] after:bg-linear-to-r after:from-indigo-500 after:to-pink-500 after:-translate-x-full hover:after:translate-x-0 after:transition-transform after:duration-500 ease-in-out hover:text-gray-700 dark:hover:text-gray-200"
                  >
                    <a href="javascript:void(0)">Sign in</a>
                  </li>
                  <li
                    class="relative overflow-hidden mb-1 lg:mb-3 py-1 lg:py-2 after:absolute after:left-0 after:bottom-0 after:w-full after:h-0.5 after:content-[''] after:bg-linear-to-r after:from-indigo-500 after:to-pink-500 after:-translate-x-full hover:after:translate-x-0 after:transition-transform after:duration-500 ease-in-out hover:text-gray-700 dark:hover:text-gray-200"
                  >
                    <a href="javascript:void(0)">Sign up</a>
                  </li>
                  <li
                    class="relative overflow-hidden py-1 lg:py-2 after:absolute after:left-0 after:bottom-0 after:w-full after:h-0.5 after:content-[''] after:bg-linear-to-r after:from-indigo-500 after:to-pink-500 after:-translate-x-full hover:after:translate-x-0 after:transition-transform after:duration-500 ease-in-out hover:text-gray-700 dark:hover:text-gray-200"
                  >
                    <a href="javascript:void(0)">404</a>
                  </li>
                </ul>
              </div>
            </li>
            <li class="transition-colors duration-300 lg:hover:text-indigo-500">
              <a href="javascript:void(0)">Support</a>
            </li>
          </ul>
        </nav>
      </div>

      <div class="header-right hidden lg:flex lg:gap-8 lg:items-center">
        <button aria-label="Toggle theme" class="w-8" data-btn="switch-mode">
          <img
            src="./assets/img/contents/night-mode-icon.png"
            alt="switch mode icon"
            class="block dark:hidden cursor-pointer transition-transform duration-200 hover:scale-110"
            data-img="icon"
          />
          <img
            src="./assets/img/contents/light-mode-icon.png"
            alt="switch mode icon"
            class="hidden dark:block cursor-pointer transition-transform duration-200 hover:scale-110"
            data-img="icon"
          />
        </button>

        <div class="flex items-center gap-8 text-white font-medium">
          <button
            class="text-lg cursor-pointer transition-colors duration-200 hover:text-gray-200"
          >
            Sign in
          </button>
          <button
            class="px-8 py-3 border-none rounded-full shadow-sm bg-white/15 cursor-pointer transition-colors duration-200 hover:bg-white/25"
          >
            Sign up
          </button>
        </div>
